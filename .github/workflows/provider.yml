name: Consumer

on: [push, pull_request]

jobs:
  build:
    environment: Pact
    runs-on: ubuntu-latest

    steps:
      - name: 00. Checkout Code
        uses: actions/checkout@v5

      - name: 0. Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: 'maven'

      - name: 0. Install Pact CLI
        run: |
          curl -fsSL https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.5/pact-2.4.5-linux-x86_64.tar.gz | tar xz -C $HOME
          echo "$HOME/pact/bin" >> $GITHUB_PATH

      
      - name: 4. Run Provider Verification
        working-directory: week4provider
        run: |
          mvn -Dtest=OmsProviderVerification \
              -Dgit.sha=${{ github.sha }} \
              -Dpact.broker.url=${{secrets.PACT_URL}} \
              -Dpact.broker.token=-${{secrets.PACT_TOKEN}} \
              test

      - name: 5. Record provider deployment to production
        working-directory: week4provider
        run: |
          pact-broker record-deployment \
            --pacticipant retail-app \
            --version ${{ github.sha }} \
            --environment production \
            --broker-base-url=${{secrets.PACT_URL}} \
            --broker-token=${{secrets.PACT_TOKEN}}
      